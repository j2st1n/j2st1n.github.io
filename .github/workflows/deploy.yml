name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GISCUS_REPO: j2st1n/j2st1n.github.io
      PUBLIC_GISCUS_REPO_ID: R_kgDORnRgRQ
      PUBLIC_GISCUS_CATEGORY: Announcements
      PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDORnRgRc4C8TS8
      PUBLIC_GISCUS_MAPPING: pathname
      PUBLIC_GISCUS_STRICT: "0"
      PUBLIC_GISCUS_REACTIONS_ENABLED: "1"
      PUBLIC_GISCUS_INPUT_POSITION: bottom
      PUBLIC_GISCUS_LANG: zh-CN
      PUBLIC_GISCUS_LOADING: lazy
      PUBLIC_GISCUS_EMIT_METADATA: "0"
      PUBLIC_GISCUS_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
